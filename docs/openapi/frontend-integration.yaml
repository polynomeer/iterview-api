openapi: 3.0.3
info:
  title: Iterview Frontend Integration API
  version: "2026-03-11"
  description: >
    Frontend-oriented OpenAPI snapshot for the implemented interview intelligence
    flows. This file is documentation-only and does not participate in runtime logic.
servers:
  - url: http://localhost:8080
    description: Local development
security:
  - bearerAuth: []
tags:
  - name: Profile
  - name: Home
  - name: Resume
  - name: Questions
  - name: Answers
  - name: Skills
  - name: Review Queue
  - name: Interview Sessions
paths:
  /api/me:
    get:
      tags: [Profile]
      summary: Get current user aggregate
      responses:
        "200":
          description: Current user aggregate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
  /api/me/profile-image:
    post:
      tags: [Profile]
      summary: Upload current user profile image
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Uploaded profile image metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileImageUploadResponseDto"
  /api/home:
    get:
      tags: [Home]
      summary: Get home dashboard payload
      responses:
        "200":
          description: Home dashboard payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HomeResponseDto"
  /api/resumes/latest:
    get:
      tags: [Resume]
      summary: Get latest or primary resume
      responses:
        "200":
          description: Latest resume container
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeDto"
  /api/resumes/{resumeId}/versions/upload:
    post:
      tags: [Resume]
      summary: Upload PDF resume version
      parameters:
        - $ref: "#/components/parameters/ResumeId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                summaryText:
                  type: string
      responses:
        "200":
          description: Uploaded resume version metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeVersionDto"
  /api/resume-versions/{versionId}:
    get:
      tags: [Resume]
      summary: Get resume version detail
      parameters:
        - $ref: "#/components/parameters/VersionId"
      responses:
        "200":
          description: Resume version detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeVersionDto"
  /api/resume-versions/{versionId}/file:
    get:
      tags: [Resume]
      summary: Download resume version file
      parameters:
        - $ref: "#/components/parameters/VersionId"
      responses:
        "200":
          description: Resume file stream
          content:
            application/pdf:
              schema:
                type: string
                format: binary
  /api/resume-versions/{versionId}/skills:
    get:
      tags: [Resume]
      summary: Get extracted resume skills
      parameters:
        - $ref: "#/components/parameters/VersionId"
      responses:
        "200":
          description: Skill snapshot list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeSkillSnapshotResponseDto"
  /api/resume-versions/{versionId}/experiences:
    get:
      tags: [Resume]
      summary: Get extracted resume experiences
      parameters:
        - $ref: "#/components/parameters/VersionId"
      responses:
        "200":
          description: Experience snapshot list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeExperienceSnapshotResponseDto"
  /api/resume-versions/{versionId}/risks:
    get:
      tags: [Resume]
      summary: Get extracted resume risk items
      parameters:
        - $ref: "#/components/parameters/VersionId"
      responses:
        "200":
          description: Resume risk list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeRiskItemResponseDto"
  /api/questions/{questionId}:
    get:
      tags: [Questions]
      security: []
      summary: Get question detail
      parameters:
        - $ref: "#/components/parameters/QuestionId"
      responses:
        "200":
          description: Question detail payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestionDetailResponse"
  /api/questions/{questionId}/tree:
    get:
      tags: [Questions]
      summary: Get question follow-up tree
      parameters:
        - $ref: "#/components/parameters/QuestionId"
      responses:
        "200":
          description: Rooted question tree
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestionTreeResponseDto"
  /api/questions/{questionId}/recommended-followups:
    get:
      tags: [Questions]
      summary: Get recommended follow-up questions
      parameters:
        - $ref: "#/components/parameters/QuestionId"
      responses:
        "200":
          description: Recommended follow-up questions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecommendedFollowUpDto"
  /api/questions/resume-based:
    get:
      tags: [Questions]
      summary: Get resume-based recommended questions
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
      responses:
        "200":
          description: Resume-derived recommended questions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ResumeBasedQuestionDto"
  /api/questions/{questionId}/answers:
    get:
      tags: [Answers]
      summary: List answer attempts for a question
      parameters:
        - $ref: "#/components/parameters/QuestionId"
      responses:
        "200":
          description: Answer history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnswerAttemptListItemDto"
    post:
      tags: [Answers]
      summary: Submit answer attempt
      parameters:
        - $ref: "#/components/parameters/QuestionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitAnswerRequest"
      responses:
        "200":
          description: Submission result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitAnswerResponseDto"
  /api/answer-attempts/{answerAttemptId}:
    get:
      tags: [Answers]
      summary: Get answer attempt detail
      parameters:
        - $ref: "#/components/parameters/AnswerAttemptId"
      responses:
        "200":
          description: Answer attempt detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnswerAttemptDetailResponseDto"
  /api/answer-attempts/{answerAttemptId}/analysis:
    get:
      tags: [Answers]
      summary: Get answer analysis
      parameters:
        - $ref: "#/components/parameters/AnswerAttemptId"
      responses:
        "200":
          description: Answer analysis payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnswerAnalysisDto"
  /api/skills/radar:
    get:
      tags: [Skills]
      summary: Get skill radar
      responses:
        "200":
          description: Skill radar payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillRadarResponseDto"
  /api/skills/gaps:
    get:
      tags: [Skills]
      summary: Get ranked skill gaps
      responses:
        "200":
          description: Ranked gap list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SkillGapItemDto"
  /api/skills/progress:
    get:
      tags: [Skills]
      summary: Get skill progress snapshot
      responses:
        "200":
          description: Skill progress list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SkillProgressItemDto"
  /api/review-queue:
    get:
      tags: [Review Queue]
      summary: List pending review queue items
      responses:
        "200":
          description: Pending queue items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReviewQueueItemDto"
  /api/review-queue/{queueId}/skip:
    post:
      tags: [Review Queue]
      summary: Skip review queue item
      parameters:
        - $ref: "#/components/parameters/QueueId"
      responses:
        "200":
          description: Queue state update
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewQueueActionResponseDto"
  /api/review-queue/{queueId}/done:
    post:
      tags: [Review Queue]
      summary: Complete review queue item
      parameters:
        - $ref: "#/components/parameters/QueueId"
      responses:
        "200":
          description: Queue state update
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewQueueActionResponseDto"
  /api/interview-sessions:
    post:
      tags: [Interview Sessions]
      summary: Create interview session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInterviewSessionRequest"
      responses:
        "200":
          description: Created session detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterviewSessionDetailResponseDto"
  /api/interview-sessions/{sessionId}:
    get:
      tags: [Interview Sessions]
      summary: Get interview session detail
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Session detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterviewSessionDetailResponseDto"
  /api/interview-sessions/{sessionId}/answers:
    post:
      tags: [Interview Sessions]
      summary: Submit session answer
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitInterviewSessionAnswerRequest"
      responses:
        "200":
          description: Session answer result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterviewSessionAnswerResponseDto"
  /api/interview-sessions/{sessionId}/next-question:
    post:
      tags: [Interview Sessions]
      summary: Advance to next interview question
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Advanced session state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterviewSessionAdvanceResponseDto"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    VersionId:
      in: path
      name: versionId
      required: true
      schema:
        type: integer
        format: int64
    ResumeId:
      in: path
      name: resumeId
      required: true
      schema:
        type: integer
        format: int64
    QuestionId:
      in: path
      name: questionId
      required: true
      schema:
        type: integer
        format: int64
    AnswerAttemptId:
      in: path
      name: answerAttemptId
      required: true
      schema:
        type: integer
        format: int64
    QueueId:
      in: path
      name: queueId
      required: true
      schema:
        type: integer
        format: int64
    SessionId:
      in: path
      name: sessionId
      required: true
      schema:
        type: integer
        format: int64
  schemas:
    MeResponse:
      type: object
      properties:
        profile:
          $ref: "#/components/schemas/ProfileDto"
        settings:
          $ref: "#/components/schemas/SettingsDto"
        activeResumeVersionSummary:
          allOf:
            - $ref: "#/components/schemas/ActiveResumeVersionSummaryDto"
          nullable: true
        targetCompanies:
          type: array
          items:
            $ref: "#/components/schemas/TargetCompanyDto"
    ProfileDto:
      type: object
      properties:
        nickname: { type: string, nullable: true }
        jobRoleId: { type: integer, format: int64, nullable: true }
        yearsOfExperience: { type: integer, nullable: true }
        profileImageUrl: { type: string, nullable: true }
        profileImageFileName: { type: string, nullable: true }
        profileImageContentType: { type: string, nullable: true }
        profileImageUploadedAt: { type: string, format: date-time, nullable: true }
    ProfileImageUploadResponseDto:
      type: object
      properties:
        imageUrl: { type: string }
        fileName: { type: string }
        contentType: { type: string }
        uploadedAt: { type: string, format: date-time }
    SettingsDto:
      type: object
      properties:
        targetScoreThreshold: { type: integer }
        passScoreThreshold: { type: integer }
        retryEnabled: { type: boolean }
        dailyQuestionCount: { type: integer }
    ActiveResumeVersionSummaryDto:
      type: object
      properties:
        resumeId: { type: integer, format: int64 }
        resumeTitle: { type: string }
        versionId: { type: integer, format: int64 }
        versionNo: { type: integer }
        uploadedAt: { type: string, format: date-time }
    TargetCompanyDto:
      type: object
      properties:
        companyId: { type: integer, format: int64 }
        companyName: { type: string }
        priorityOrder: { type: integer }
    ResumeDto:
      type: object
      properties:
        id: { type: integer, format: int64 }
        title: { type: string }
        isPrimary: { type: boolean }
        versions:
          type: array
          items:
            $ref: "#/components/schemas/ResumeVersionDto"
    ResumeVersionDto:
      type: object
      properties:
        id: { type: integer, format: int64 }
        versionNo: { type: integer }
        fileUrl: { type: string, nullable: true }
        fileName: { type: string, nullable: true }
        fileType: { type: string, nullable: true }
        fileSizeBytes: { type: integer, format: int64, nullable: true }
        summaryText: { type: string, nullable: true }
        parsingStatus: { type: string }
        parseStartedAt: { type: string, format: date-time, nullable: true }
        parseCompletedAt: { type: string, format: date-time, nullable: true }
        parseErrorMessage: { type: string, nullable: true }
        isActive: { type: boolean }
        uploadedAt: { type: string, format: date-time }
    ResumeSkillSnapshotResponseDto:
      type: object
      properties:
        resumeVersionId: { type: integer, format: int64 }
        items:
          type: array
          items:
            $ref: "#/components/schemas/ResumeSkillSnapshotDto"
        generatedAt: { type: string, format: date-time }
    ResumeSkillSnapshotDto:
      type: object
      properties:
        skillId: { type: integer, format: int64, nullable: true }
        skillName: { type: string }
        skillCategory: { type: string, nullable: true }
        sourceText: { type: string, nullable: true }
        confidenceScore: { type: number, format: double, nullable: true }
        confirmed: { type: boolean }
    ResumeExperienceSnapshotResponseDto:
      type: object
      properties:
        resumeVersionId: { type: integer, format: int64 }
        items:
          type: array
          items:
            $ref: "#/components/schemas/ResumeExperienceSnapshotDto"
        generatedAt: { type: string, format: date-time }
    ResumeExperienceSnapshotDto:
      type: object
      properties:
        id: { type: integer, format: int64 }
        projectName: { type: string, nullable: true }
        summaryText: { type: string }
        impactText: { type: string, nullable: true }
        sourceText: { type: string }
        riskLevel: { type: string }
        displayOrder: { type: integer }
        confirmed: { type: boolean }
    ResumeRiskItemResponseDto:
      type: object
      properties:
        resumeVersionId: { type: integer, format: int64 }
        items:
          type: array
          items:
            $ref: "#/components/schemas/ResumeRiskItemDto"
        generatedAt: { type: string, format: date-time }
    ResumeRiskItemDto:
      type: object
      properties:
        id: { type: integer, format: int64 }
        resumeExperienceSnapshotId: { type: integer, format: int64, nullable: true }
        linkedQuestionId: { type: integer, format: int64, nullable: true }
        riskType: { type: string }
        title: { type: string }
        description: { type: string }
        severity: { type: string }
    QuestionDetailResponse:
      type: object
      properties:
        question:
          $ref: "#/components/schemas/QuestionSummaryDetailDto"
        tags:
          type: array
          items:
            $ref: "#/components/schemas/QuestionTagDto"
        companies:
          type: array
          items:
            $ref: "#/components/schemas/QuestionCompanyDto"
        roles:
          type: array
          items:
            $ref: "#/components/schemas/QuestionRoleDto"
        learningMaterials:
          type: array
          items:
            $ref: "#/components/schemas/LearningMaterialDto"
        userProgressSummary:
          allOf:
            - $ref: "#/components/schemas/UserProgressSummaryDto"
          nullable: true
    QuestionSummaryDetailDto:
      type: object
      properties:
        id: { type: integer, format: int64 }
        title: { type: string }
        body: { type: string }
        categoryId: { type: integer, format: int64 }
        categoryName: { type: string }
        questionType: { type: string }
        difficultyLevel: { type: string }
        qualityStatus: { type: string }
        expectedAnswerSeconds: { type: integer, nullable: true }
    QuestionTreeResponseDto:
      type: object
      properties:
        root:
          $ref: "#/components/schemas/QuestionTreeNodeDto"
    QuestionTreeNodeDto:
      type: object
      properties:
        questionId: { type: integer, format: int64 }
        title: { type: string }
        difficulty: { type: string }
        depth: { type: integer }
        relationshipType: { type: string, nullable: true }
        nodeStatus: { type: string }
        children:
          type: array
          items:
            $ref: "#/components/schemas/QuestionTreeNodeDto"
    RecommendedFollowUpDto:
      type: object
      properties:
        questionId: { type: integer, format: int64 }
        title: { type: string }
        difficulty: { type: string }
        relationshipType: { type: string }
        depth: { type: integer }
        nodeStatus: { type: string }
    ResumeBasedQuestionDto:
      type: object
      properties:
        questionId: { type: integer, format: int64 }
        title: { type: string }
        difficulty: { type: string }
        matchScore: { type: number, format: double }
        matchedSkills:
          type: array
          items: { type: string }
    SubmitAnswerRequest:
      type: object
      required: [answerMode, contentText]
      properties:
        resumeVersionId: { type: integer, format: int64, nullable: true }
        answerMode: { type: string, example: text }
        contentText: { type: string }
    SubmitAnswerResponseDto:
      type: object
      properties:
        answerAttemptId: { type: integer, format: int64 }
        scoreSummary:
          $ref: "#/components/schemas/ScoreSummaryDto"
        feedback:
          type: array
          items:
            $ref: "#/components/schemas/AnswerFeedbackItemDto"
        progressStatus: { type: string }
        nextReviewAt: { type: string, format: date-time, nullable: true }
        archiveDecision: { type: boolean }
    AnswerAttemptListItemDto:
      type: object
      properties:
        id: { type: integer, format: int64 }
        attemptNo: { type: integer }
        answerMode: { type: string }
        submittedAt: { type: string, format: date-time }
        score:
          $ref: "#/components/schemas/ScoreSummaryDto"
    AnswerAttemptDetailResponseDto:
      type: object
      properties:
        answerAttempt:
          $ref: "#/components/schemas/AnswerAttemptDto"
        score:
          $ref: "#/components/schemas/ScoreSummaryDto"
        feedback:
          type: array
          items:
            $ref: "#/components/schemas/AnswerFeedbackItemDto"
        progressSummary:
          allOf:
            - $ref: "#/components/schemas/UserProgressSummaryDto"
          nullable: true
    AnswerAttemptDto:
      type: object
      properties:
        id: { type: integer, format: int64 }
        questionId: { type: integer, format: int64 }
        resumeVersionId: { type: integer, format: int64, nullable: true }
        attemptNo: { type: integer }
        answerMode: { type: string }
        contentText: { type: string }
        submittedAt: { type: string, format: date-time }
    AnswerAnalysisDto:
      type: object
      properties:
        answerAttemptId: { type: integer, format: int64 }
        overallScore: { type: number, format: double }
        depthScore: { type: number, format: double }
        clarityScore: { type: number, format: double }
        accuracyScore: { type: number, format: double }
        exampleScore: { type: number, format: double }
        tradeoffScore: { type: number, format: double }
        confidenceScore: { type: number, format: double, nullable: true }
        strengthSummary: { type: string }
        weaknessSummary: { type: string }
        recommendedNextStep: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
    ScoreSummaryDto:
      type: object
      properties:
        totalScore: { type: integer }
        structureScore: { type: integer }
        specificityScore: { type: integer }
        technicalAccuracyScore: { type: integer }
        roleFitScore: { type: integer }
        companyFitScore: { type: integer }
        communicationScore: { type: integer }
        evaluationResult: { type: string }
    AnswerFeedbackItemDto:
      type: object
      properties:
        id: { type: integer, format: int64 }
        feedbackType: { type: string }
        severity: { type: string }
        title: { type: string }
        body: { type: string }
        displayOrder: { type: integer }
    UserProgressSummaryDto:
      type: object
      properties:
        currentStatus: { type: string }
        latestScore: { type: number, format: double, nullable: true }
        bestScore: { type: number, format: double, nullable: true }
        totalAttemptCount: { type: integer }
        lastAnsweredAt: { type: string, format: date-time, nullable: true }
        nextReviewAt: { type: string, format: date-time, nullable: true }
        masteryLevel: { type: string, nullable: true }
    SkillRadarResponseDto:
      type: object
      properties:
        categories:
          type: array
          items:
            $ref: "#/components/schemas/SkillRadarCategoryDto"
        updatedAt: { type: string, format: date-time }
    SkillRadarCategoryDto:
      type: object
      properties:
        categoryCode: { type: string }
        label: { type: string }
        score: { type: number, format: double }
        benchmarkScore: { type: number, format: double, nullable: true }
        gapScore: { type: number, format: double, nullable: true }
    SkillGapItemDto:
      type: object
      properties:
        categoryCode: { type: string }
        label: { type: string }
        score: { type: number, format: double }
        benchmarkScore: { type: number, format: double, nullable: true }
        gapScore: { type: number, format: double, nullable: true }
    SkillProgressItemDto:
      type: object
      properties:
        categoryCode: { type: string }
        label: { type: string }
        score: { type: number, format: double }
        benchmarkScore: { type: number, format: double, nullable: true }
        gapScore: { type: number, format: double, nullable: true }
        answeredQuestionCount: { type: integer }
        weakQuestionCount: { type: integer }
        calculatedAt: { type: string, format: date-time }
    ReviewQueueItemDto:
      type: object
      properties:
        id: { type: integer, format: int64 }
        questionId: { type: integer, format: int64 }
        questionTitle: { type: string }
        questionDifficulty: { type: string }
        reasonType: { type: string }
        priority: { type: integer }
        scheduledFor: { type: string, format: date-time }
        status: { type: string }
    ReviewQueueActionResponseDto:
      type: object
      properties:
        id: { type: integer, format: int64 }
        status: { type: string }
        updatedAt: { type: string, format: date-time }
    HomeResponseDto:
      type: object
      properties:
        todayQuestion:
          allOf:
            - $ref: "#/components/schemas/HomeQuestionDto"
          nullable: true
        retryQuestions:
          type: array
          items:
            $ref: "#/components/schemas/HomeRetryQuestionDto"
        learningMaterials:
          type: array
          items:
            $ref: "#/components/schemas/LearningMaterialDto"
        summaryStats:
          $ref: "#/components/schemas/HomeSummaryStatsDto"
        skillRadarPreview:
          type: array
          items:
            $ref: "#/components/schemas/HomeSkillRadarPreviewDto"
        weakSkillHighlights:
          type: array
          items:
            $ref: "#/components/schemas/HomeWeakSkillDto"
        resumeRiskPreview:
          type: array
          items:
            $ref: "#/components/schemas/HomeResumeRiskQuestionDto"
    HomeQuestionDto:
      type: object
      properties:
        dailyCardId: { type: integer, format: int64 }
