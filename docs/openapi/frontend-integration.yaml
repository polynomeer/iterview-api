        - $ref: "#/components/parameters/RecordId"
      responses:
        "200":
          description: Updated imported interview record detail after re-queueing transcription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterviewRecordDetailDto"
  /api/interview-records/{recordId}/questions:
