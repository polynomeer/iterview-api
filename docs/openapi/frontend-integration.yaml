      parameters:
        - $ref: "#/components/parameters/RecordId"
      responses:
        "200":
          description: Practical interview review payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterviewRecordReviewDto"
    patch:
      tags: [Interview Records]
      summary: Apply bulk transcript review edits and optionally confirm
      parameters:
        - $ref: "#/components/parameters/RecordId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkUpdateInterviewTranscriptSegmentsRequest"
      responses:
        "200":
          description: Updated practical interview review payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterviewRecordReviewDto"
  /api/interview-records/{recordId}/analysis:
    get:
