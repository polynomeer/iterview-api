          description: Inferred interviewer profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterviewerProfileDto"
  /api/interview-records/{recordId}/confirm:
    post:
      tags: [Interview Records]
      summary: Confirm practical interview structuring review
      parameters:
        - $ref: "#/components/parameters/RecordId"
      responses:
        "200":
          description: Confirmed imported interview record detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterviewRecordDetailDto"
  /api/interview-sessions:
    get:
      tags: [Interview Sessions]
      summary: List interview sessions
