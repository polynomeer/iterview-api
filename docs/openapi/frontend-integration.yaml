openapi: 3.0.3
info:
  title: Iterview Frontend Integration API
  version: "2026-03-11"
  description: >
    Frontend-oriented OpenAPI snapshot for the implemented interview intelligence
    flows. This file is documentation-only and does not participate in runtime logic.
servers:
  - url: http://localhost:8080
    description: Local development
security:
  - bearerAuth: []
tags:
  - name: Profile
  - name: Home
  - name: Resume
  - name: Job Posting
  - name: Questions
  - name: Answers
  - name: Skills
  - name: Review Queue
  - name: Interview Sessions
paths:
  /api/me:
    get:
      tags: [Profile]
      summary: Get current user aggregate
      responses:
        "200":
          description: Current user aggregate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
  /api/me/profile-image:
    post:
      tags: [Profile]
      summary: Upload current user profile image
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Uploaded profile image metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileImageUploadResponseDto"
  /api/home:
    get:
      tags: [Home]
      summary: Get home dashboard payload
      responses:
        "200":
          description: Home dashboard payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HomeResponseDto"
  /api/resumes/latest:
    get:
      tags: [Resume]
      summary: Get latest or primary resume
      responses:
        "200":
          description: Latest resume container
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeDto"
  /api/job-postings:
    get:
      tags: [Job Posting]
      summary: List saved job postings
      responses:
        "200":
          description: Job posting list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobPostingDto"
    post:
      tags: [Job Posting]
      summary: Create and parse one job posting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobPostingRequest"
      responses:
        "200":
          description: Parsed job posting detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobPostingDto"
  /api/job-postings/{jobPostingId}:
    get:
      tags: [Job Posting]
      summary: Get one saved job posting
      parameters:
        - name: jobPostingId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: Job posting detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobPostingDto"
  /api/resumes/{resumeId}/versions/upload:
    post:
      tags: [Resume]
      summary: Upload PDF resume version
      parameters:
        - $ref: "#/components/parameters/ResumeId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                summaryText:
                  type: string
      responses:
        "200":
          description: Uploaded resume version metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeVersionDto"
  /api/resume-versions/{versionId}:
    get:
      tags: [Resume]
      summary: Get resume version detail
      parameters:
        - $ref: "#/components/parameters/VersionId"
      responses:
        "200":
          description: Resume version detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeVersionDto"
  /api/resume-versions/{versionId}/extraction:
    get:
      tags: [Resume]
      summary: Get resume version extraction status
      parameters:
        - $ref: "#/components/parameters/VersionId"
      responses:
        "200":
          description: Resume extraction status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeVersionExtractionDto"
  /api/resume-versions/{versionId}/file:
    get:
      tags: [Resume]
      summary: Download resume version file
      parameters:
        - $ref: "#/components/parameters/VersionId"
      responses:
        "200":
          description: Resume file stream
          content:
            application/pdf:
              schema:
                type: string
                format: binary
  /api/resume-versions/{versionId}/profile:
    get:
      tags: [Resume]
      summary: Get extracted resume profile
      parameters:
        - $ref: "#/components/parameters/VersionId"
      responses:
        "200":
          description: Resume profile snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeProfileSnapshotResponseDto"
  /api/resume-versions/{versionId}/contacts:
    get:
      tags: [Resume]
      summary: Get extracted resume contacts
      parameters:
        - $ref: "#/components/parameters/VersionId"
      responses:
        "200":
          description: Resume contacts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeContactPointResponseDto"
  /api/resume-versions/{versionId}/competencies:
    get:
      tags: [Resume]
      summary: Get extracted resume competencies
      parameters:
        - $ref: "#/components/parameters/VersionId"
      responses:
        "200":
          description: Resume competency statements
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeCompetencyItemResponseDto"
  /api/resume-versions/{versionId}/skills:
    get:
      tags: [Resume]
      summary: Get extracted resume skills
      parameters:
        - $ref: "#/components/parameters/VersionId"
      responses:
        "200":
          description: Skill snapshot list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeSkillSnapshotResponseDto"
  /api/resume-versions/{versionId}/experiences:
    get:
      tags: [Resume]
      summary: Get extracted resume experiences
      parameters:
        - $ref: "#/components/parameters/VersionId"
      responses:
        "200":
          description: Experience snapshot list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeExperienceSnapshotResponseDto"
  /api/resume-versions/{versionId}/projects:
    get:
      tags: [Resume]
      summary: Get extracted resume projects
      parameters:
        - $ref: "#/components/parameters/VersionId"
      responses:
        "200":
          description: Project snapshot list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeProjectSnapshotResponseDto"
  /api/resume-versions/{versionId}/achievements:
    get:
      tags: [Resume]
      summary: Get extracted resume achievements
      parameters:
        - $ref: "#/components/parameters/VersionId"
      responses:
        "200":
          description: Achievement list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeAchievementItemResponseDto"
  /api/resume-versions/{versionId}/education:
    get:
      tags: [Resume]
      summary: Get extracted resume education items
      parameters:
        - $ref: "#/components/parameters/VersionId"
      responses:
        "200":
          description: Education list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeEducationItemResponseDto"
  /api/resume-versions/{versionId}/certifications:
    get:
      tags: [Resume]
      summary: Get extracted resume certifications
      parameters:
        - $ref: "#/components/parameters/VersionId"
      responses:
        "200":
          description: Certification list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeCertificationItemResponseDto"
  /api/resume-versions/{versionId}/awards:
    get:
      tags: [Resume]
      summary: Get extracted resume awards
      parameters:
        - $ref: "#/components/parameters/VersionId"
      responses:
        "200":
          description: Award list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeAwardItemResponseDto"
  /api/resume-versions/{versionId}/risks:
    get:
      tags: [Resume]
      summary: Get extracted resume risk items
      parameters:
        - $ref: "#/components/parameters/VersionId"
      responses:
        "200":
          description: Resume risk list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeRiskItemResponseDto"
  /api/resume-versions/{versionId}/question-heatmap:
    get:
      tags: [Resume]
      summary: Get resume interview heatmap for one resume version
      parameters:
        - $ref: "#/components/parameters/VersionId"
        - name: scope
          in: query
          required: false
          schema: { type: string, default: all }
        - name: weakOnly
          in: query
          required: false
          schema: { type: boolean, default: false }
        - name: companyName
          in: query
          required: false
          schema: { type: string }
        - name: interviewDateFrom
          in: query
          required: false
          schema: { type: string, format: date }
        - name: interviewDateTo
          in: query
          required: false
          schema: { type: string, format: date }
        - name: targetType
          in: query
          required: false
          schema: { type: string }
      responses:
        "200":
          description: Resume question heatmap
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeQuestionHeatmapDto"
  /api/resume-versions/{versionId}/question-heatmap/overlay-targets:
    get:
      tags: [Resume]
      summary: Get resume interview heatmap overlay targets for one resume version
      parameters:
        - $ref: "#/components/parameters/VersionId"
        - name: scope
          in: query
          required: false
          schema: { type: string, default: all }
        - name: weakOnly
          in: query
          required: false
          schema: { type: boolean, default: false }
        - name: companyName
          in: query
          required: false
          schema: { type: string }
        - name: interviewDateFrom
          in: query
          required: false
          schema: { type: string, format: date }
        - name: interviewDateTo
          in: query
          required: false
          schema: { type: string, format: date }
        - name: targetType
          in: query
          required: false
          schema: { type: string }
      responses:
        "200":
          description: Resume question heatmap overlay target list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeQuestionHeatmapOverlayTargetListDto"
  /api/resume-versions/{versionId}/question-heatmap/links:
    post:
      tags: [Resume]
      summary: Create or replace one manual heatmap link
      parameters:
        - $ref: "#/components/parameters/VersionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateResumeQuestionHeatmapLinkRequest"
      responses:
        "200":
          description: Resume heatmap link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeQuestionHeatmapLinkDto"
  /api/resume-versions/{versionId}/question-heatmap/links/{linkId}:
    patch:
      tags: [Resume]
      summary: Update one manual heatmap link
      parameters:
        - $ref: "#/components/parameters/VersionId"
        - name: linkId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateResumeQuestionHeatmapLinkRequest"
      responses:
        "200":
          description: Updated resume heatmap link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeQuestionHeatmapLinkDto"
  /api/resume-versions/{versionId}/editor:
    get:
      tags: [Resume]
      summary: Get or initialize one resume editor workspace
      parameters:
        - $ref: "#/components/parameters/VersionId"
      responses:
        "200":
          description: Resume editor workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeEditorWorkspaceDto"
  /api/resume-versions/{versionId}/editor/document:
    put:
      tags: [Resume]
      summary: Replace one resume editor document
      parameters:
        - $ref: "#/components/parameters/VersionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateResumeEditorDocumentRequest"
      responses:
        "200":
          description: Updated resume editor workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeEditorWorkspaceDto"
  /api/resume-versions/{versionId}/editor/comments:
    post:
      tags: [Resume]
      summary: Create one resume editor comment thread
      parameters:
        - $ref: "#/components/parameters/VersionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateResumeEditorCommentRequest"
      responses:
        "200":
          description: Resume editor comment thread
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeEditorCommentThreadDto"
  /api/resume-versions/{versionId}/editor/comments/{commentId}:
    patch:
      tags: [Resume]
      summary: Update one resume editor comment thread
      parameters:
        - $ref: "#/components/parameters/VersionId"
        - name: commentId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateResumeEditorCommentRequest"
      responses:
        "200":
          description: Updated resume editor comment thread
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeEditorCommentThreadDto"
  /api/resume-versions/{versionId}/editor/question-cards:
    post:
      tags: [Resume]
      summary: Create one resume editor question card
      parameters:
        - $ref: "#/components/parameters/VersionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateResumeEditorQuestionCardRequest"
      responses:
        "200":
          description: Resume editor question card
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeEditorQuestionCardDto"
  /api/resume-versions/{versionId}/editor/question-cards/{cardId}:
    patch:
      tags: [Resume]
      summary: Update one resume editor question card
      parameters:
        - $ref: "#/components/parameters/VersionId"
        - name: cardId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateResumeEditorQuestionCardRequest"
      responses:
        "200":
          description: Updated resume editor question card
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeEditorQuestionCardDto"
  /api/resume-versions/{versionId}/editor/auto-question-suggestions:
    post:
      tags: [Resume]
      summary: Generate deterministic resume editor question suggestions
      parameters:
        - $ref: "#/components/parameters/VersionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateResumeEditorQuestionSuggestionRequest"
      responses:
        "200":
          description: Resume editor question suggestion payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeEditorQuestionSuggestionResponseDto"
  /api/resume-versions/{versionId}/editor/rewrite-suggestions:
    post:
      tags: [Resume]
      summary: Generate deterministic resume editor rewrite suggestions
      parameters:
        - $ref: "#/components/parameters/VersionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateResumeEditorRewriteSuggestionRequest"
      responses:
        "200":
          description: Resume editor rewrite suggestion payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeEditorRewriteSuggestionResponseDto"
  /api/resume-versions/{versionId}/analyses:
    get:
      tags: [Resume]
      summary: List persisted analyses for one resume version
      parameters:
        - $ref: "#/components/parameters/VersionId"
      responses:
        "200":
          description: Resume analysis list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ResumeAnalysisListItemDto"
    post:
      tags: [Resume]
      summary: Create one job-aware analysis for a resume version
      parameters:
        - $ref: "#/components/parameters/VersionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateResumeAnalysisRequest"
      responses:
        "200":
          description: Resume analysis detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeAnalysisDto"
  /api/resume-versions/{versionId}/analyses/{analysisId}:
    get:
      tags: [Resume]
      summary: Get one persisted resume analysis
      parameters:
        - $ref: "#/components/parameters/VersionId"
        - name: analysisId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: Resume analysis detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeAnalysisDto"
  /api/resume-versions/{versionId}/analyses/{analysisId}/suggestions/{suggestionId}:
    patch:
      tags: [Resume]
      summary: Accept or unaccept one resume analysis suggestion
      parameters:
        - $ref: "#/components/parameters/VersionId"
        - name: analysisId
          in: path
          required: true
          schema: { type: integer, format: int64 }
        - name: suggestionId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateResumeAnalysisSuggestionRequest"
      responses:
        "200":
          description: Updated resume analysis detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeAnalysisDto"
  /api/resume-versions/{versionId}/analyses/{analysisId}/exports:
    get:
      tags: [Resume]
      summary: List tailored resume exports for one analysis
      parameters:
        - $ref: "#/components/parameters/VersionId"
        - name: analysisId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: Export history for one analysis
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ResumeAnalysisExportDto"
    post:
      tags: [Resume]
      summary: Create one tailored resume export for one analysis
      parameters:
        - $ref: "#/components/parameters/VersionId"
        - name: analysisId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateResumeAnalysisExportRequest"
      responses:
        "200":
          description: Created export metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeAnalysisExportDto"
  /api/resume-versions/{versionId}/analyses/{analysisId}/exports/{exportId}/file:
    get:
      tags: [Resume]
      summary: Download one tailored resume export file
      parameters:
        - $ref: "#/components/parameters/VersionId"
        - name: analysisId
          in: path
          required: true
          schema: { type: integer, format: int64 }
        - name: exportId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: Export file stream
          content:
            application/pdf:
              schema:
                type: string
                format: binary
  /api/resume-versions/{versionId}/re-extract:
    post:
      tags: [Resume]
      summary: Re-run structured extraction for a resume version
      parameters:
        - $ref: "#/components/parameters/VersionId"
      responses:
        "200":
          description: Resume extraction status after re-run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeVersionExtractionDto"
  /api/questions/{questionId}:
    get:
      tags: [Questions]
      security: []
      summary: Get question detail
      parameters:
        - $ref: "#/components/parameters/QuestionId"
      responses:
        "200":
          description: Question detail payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestionDetailResponse"
  /api/questions/{questionId}/reference-answers:
    get:
      tags: [Questions]
      security: []
      summary: Get curated model answers for a question
      parameters:
        - $ref: "#/components/parameters/QuestionId"
      responses:
        "200":
          description: Question reference answers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QuestionReferenceAnswerDto"
    post:
      tags: [Questions]
      summary: Add a user reference answer for a question
      parameters:
        - $ref: "#/components/parameters/QuestionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuestionReferenceAnswerRequest"
      responses:
        "200":
          description: Created question reference answer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestionReferenceAnswerDto"
  /api/questions/{questionId}/learning-materials:
    get:
      tags: [Questions]
      security: []
      summary: Get curated learning materials for a question
      parameters:
        - $ref: "#/components/parameters/QuestionId"
      responses:
        "200":
          description: Question learning materials
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LearningMaterialDto"
    post:
      tags: [Questions]
      summary: Add a user learning material for a question
      parameters:
        - $ref: "#/components/parameters/QuestionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuestionLearningMaterialRequest"
      responses:
        "200":
          description: Created question learning material
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LearningMaterialDto"
  /api/questions/{questionId}/tree:
    get:
      tags: [Questions]
      summary: Get question follow-up tree
      parameters:
        - $ref: "#/components/parameters/QuestionId"
      responses:
        "200":
          description: Rooted question tree
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestionTreeResponseDto"
  /api/questions/{questionId}/recommended-followups:
    get:
      tags: [Questions]
      summary: Get recommended follow-up questions
      parameters:
        - $ref: "#/components/parameters/QuestionId"
      responses:
        "200":
          description: Recommended follow-up questions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecommendedFollowUpDto"
  /api/questions/resume-based:
    get:
      tags: [Questions]
      summary: Get resume-based recommended questions
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
      responses:
        "200":
          description: Resume-derived recommended questions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ResumeBasedQuestionDto"
  /api/questions/{questionId}/answers:
    get:
      tags: [Answers]
      summary: List answer attempts for a question
      parameters:
        - $ref: "#/components/parameters/QuestionId"
      responses:
        "200":
          description: Answer history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnswerAttemptListItemDto"
    post:
      tags: [Answers]
      summary: Submit answer attempt
      parameters:
        - $ref: "#/components/parameters/QuestionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitAnswerRequest"
      responses:
        "200":
          description: Submission result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitAnswerResponseDto"
  /api/answer-attempts/{answerAttemptId}:
    get:
      tags: [Answers]
      summary: Get answer attempt detail
      parameters:
        - $ref: "#/components/parameters/AnswerAttemptId"
      responses:
        "200":
          description: Answer attempt detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnswerAttemptDetailResponseDto"
  /api/answer-attempts/{answerAttemptId}/analysis:
    get:
      tags: [Answers]
      summary: Get answer analysis
      parameters:
