        - $ref: "#/components/parameters/RecordId"
        - $ref: "#/components/parameters/SegmentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInterviewTranscriptSegmentRequest"
