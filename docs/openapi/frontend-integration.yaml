        "200":
          description: Session history list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InterviewSessionListItemDto"
    post:
      tags: [Interview Sessions]
      summary: Create interview session
      description: For `resume_mock`, send an explicit `resumeVersionId`. The opening question may be AI-generated from the selected resume.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInterviewSessionRequest"
      responses:
        "200":
          description: Created session detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterviewSessionDetailResponseDto"
  /api/interview-sessions/{sessionId}:
    get:
      tags: [Interview Sessions]
      summary: Get interview session detail
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Session detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterviewSessionDetailResponseDto"
  /api/interview-sessions/{sessionId}/coverage:
    get:
      tags: [Interview Sessions]
      summary: Get interview session coverage
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Session coverage summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterviewSessionCoverageResponseDto"
  /api/interview-sessions/{sessionId}/resume-map:
    get:
      tags: [Interview Sessions]
      summary: Get interview session resume map
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Session resume evidence map
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterviewSessionResumeMapResponseDto"
  /api/interview-sessions/{sessionId}/answers:
    post:
      tags: [Interview Sessions]
      summary: Submit session answer
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitInterviewSessionAnswerRequest"
      responses:
        "200":
          description: Session answer result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterviewSessionAnswerResponseDto"
  /api/interview-sessions/{sessionId}/next-question:
    post:
      tags: [Interview Sessions]
      summary: Advance to next interview question
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Advanced session state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterviewSessionAdvanceResponseDto"
        "409":
          description: Current question has not been answered or skipped yet
  /api/interview-sessions/{sessionId}/skip-question:
    post:
      tags: [Interview Sessions]
      summary: Skip current interview question and advance
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SkipInterviewSessionQuestionRequest"
      responses:
        "200":
          description: Advanced session state after skipping the current question
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterviewSessionAdvanceResponseDto"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    VersionId:
      in: path
      name: versionId
      required: true
      schema:
        type: integer
        format: int64
    ResumeId:
      in: path
      name: resumeId
      required: true
      schema:
        type: integer
        format: int64
    QuestionId:
      in: path
      name: questionId
      required: true
      schema:
        type: integer
        format: int64
    AnswerAttemptId:
      in: path
      name: answerAttemptId
      required: true
      schema:
        type: integer
        format: int64
    QueueId:
      in: path
      name: queueId
      required: true
      schema:
        type: integer
        format: int64
    SessionId:
      in: path
      name: sessionId
      required: true
      schema:
        type: integer
        format: int64
    RecordId:
      in: path
      name: recordId
      required: true
      schema:
        type: integer
        format: int64
    SegmentId:
      in: path
      name: segmentId
      required: true
      schema:
        type: integer
        format: int64
  schemas:
    MeResponse:
      type: object
      properties:
        profile:
          $ref: "#/components/schemas/ProfileDto"
        settings:
          $ref: "#/components/schemas/SettingsDto"
        activeResumeVersionSummary:
          allOf:
            - $ref: "#/components/schemas/ActiveResumeVersionSummaryDto"
          nullable: true
        targetCompanies:
          type: array
          items:
            $ref: "#/components/schemas/TargetCompanyDto"
    ProfileDto:
      type: object
      properties:
        nickname: { type: string, nullable: true }
        jobRoleId: { type: integer, format: int64, nullable: true }
        yearsOfExperience: { type: integer, nullable: true }
        profileImageUrl: { type: string, nullable: true }
        profileImageFileName: { type: string, nullable: true }
        profileImageContentType: { type: string, nullable: true }
        profileImageUploadedAt: { type: string, format: date-time, nullable: true }
    ProfileImageUploadResponseDto:
      type: object
      properties:
        imageUrl: { type: string }
        fileName: { type: string }
        contentType: { type: string }
        uploadedAt: { type: string, format: date-time }
    SettingsDto:
      type: object
      properties:
        targetScoreThreshold: { type: integer }
        passScoreThreshold: { type: integer }
        retryEnabled: { type: boolean }
        dailyQuestionCount: { type: integer }
    ActiveResumeVersionSummaryDto:
      type: object
      properties:
        resumeId: { type: integer, format: int64 }
        resumeTitle: { type: string }
        versionId: { type: integer, format: int64 }
        versionNo: { type: integer }
        uploadedAt: { type: string, format: date-time }
    TargetCompanyDto:
      type: object
      properties:
        companyId: { type: integer, format: int64 }
        companyName: { type: string }
        priorityOrder: { type: integer }
    ResumeDto:
      type: object
      properties:
        id: { type: integer, format: int64 }
        title: { type: string }
        isPrimary: { type: boolean }
        versions:
          type: array
          items:
            $ref: "#/components/schemas/ResumeVersionDto"
    ResumeVersionDto:
      type: object
      properties:
        id: { type: integer, format: int64 }
        versionNo: { type: integer }
        fileUrl: { type: string, nullable: true }
        fileName: { type: string, nullable: true }
        fileType: { type: string, nullable: true }
        fileSizeBytes: { type: integer, format: int64, nullable: true }
