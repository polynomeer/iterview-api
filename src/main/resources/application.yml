spring:
  application:
    name: iterview-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/iterview}
    username: ${DB_USERNAME:iterview}
    password: ${DB_PASSWORD:iterview}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

auth:
  token:
    secret: ${AUTH_TOKEN_SECRET:dev-only-secret-change-me}
    ttl-seconds: ${AUTH_TOKEN_TTL_SECONDS:86400}
