spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

auth:
  token:
    secret: ${AUTH_TOKEN_SECRET}

springdoc:
  swagger-ui:
    enabled: ${SWAGGER_UI_ENABLED:false}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS}
    allowed-methods: ${APP_CORS_ALLOWED_METHODS:GET,POST,PATCH,PUT,DELETE,OPTIONS}
    allowed-headers: ${APP_CORS_ALLOWED_HEADERS:*}
    allow-credentials: ${APP_CORS_ALLOW_CREDENTIALS:true}
    max-age-seconds: ${APP_CORS_MAX_AGE_SECONDS:3600}
